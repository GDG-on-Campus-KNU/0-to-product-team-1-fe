  </g>

  <!-- ===== RIGHT: Text content ===== -->
  <!-- App name -->
  <text x="430" y="170" font-family="Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#2d2926" letter-spacing="-1">Step Back</text>

  <!-- Divider line: green from palette -->
  <rect x="430" y="192" width="48" height="3" rx="1.5" fill="#CCD3CA"/>

  <!-- Tagline -->
  <text x="430" y="232" font-family="Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#5a4f49" letter-spacing="-0.2">내 사고와 감정에서 한 발짝 떨어져</text>
  <text x="430" y="259" font-family="Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#5a4f49" letter-spacing="-0.2">패턴을 알아차리는 메타인지 도구</text>

  <!-- Domain label: beige pill -->
  <rect x="430" y="294" width="128" height="30" rx="15" fill="#EED3D9" opacity="0.6"/>
  <text x="494" y="314" font-family="Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#8a5060" text-anchor="middle">sb.soomn.com</text>
</svg>
