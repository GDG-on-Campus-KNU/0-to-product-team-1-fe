<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: warm beige to soft white -->
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf9f6"/>
      <stop offset="100%" stop-color="#f8f5f2"/>
    </linearGradient>

    <!-- Circle gradient: beige tones -->
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8ddd6"/>
      <stop offset="100%" stop-color="#f5ede7"/>
    </linearGradient>

    <!-- Blur filter -->
    <filter id="blur1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blur2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="blur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Drop shadow for badge -->
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4a09040"/>
    </filter>

    <!-- Circle shadow -->
    <filter id="circleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#ccd3ca30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Blob 1: Green (CCD3CA) — top right -->
  <ellipse cx="680" cy="-20" rx="220" ry="200" fill="#CCD3CA" opacity="0.45" filter="url(#blur1)"/>

  <!-- Blob 2: Pink (EED3D9) — bottom left -->
  <ellipse cx="60" cy="430" rx="200" ry="190" fill="#EED3D9" opacity="0.55" filter="url(#blur2)"/>

  <!-- Blob 3: Beige (F5E8DD) — center -->
  <ellipse cx="400" cy="420" rx="300" ry="160" fill="#F5E8DD" opacity="0.4" filter="url(#blur3)"/>

  <!-- Subtle top-left accent: green -->
  <ellipse cx="-30" cy="60" rx="130" ry="120" fill="#CCD3CA" opacity="0.3" filter="url(#blur2)"/>

  <!-- ===== LEFT: Icon area ===== -->
  <!-- Main circle -->
  <circle cx="220" cy="200" r="140" fill="url(#circleGrad)" stroke="#ddd0c8" stroke-width="1" filter="url(#circleShadow)"/>

  <!-- Hollow leaves icon -->
  <g transform="translate(220, 200) scale(1.4) translate(-37.5, -37)">
